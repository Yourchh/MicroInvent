name: Pipeline DevSecOps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gestión de Secretos (Trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --results=verified,unverified

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: SCA - Análisis de Dependencias (Frontend)
        working-directory: ./client
        run: |
          npm install --package-lock-only --legacy-peer-deps
          npm audit --audit-level=high

      - name: SCA - Análisis de Dependencias (Backend)
        working-directory: ./server
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high

      - name: Construir Imagen Docker (Backend)
        run: docker build -t microinvent-server:latest ./server

      - name: Seguridad de Contenedores (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'microinvent-server:latest'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'